name: Go code linters
permissions:
  contents: read

# Cancel workflow if there is a new change to the branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/go-lint.yml"
      - "go.work"
      - "mise.toml"
      - "f3-sidecar/**"
      - "interop-tests/src/tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/go-lint.yml"
      - "go.work"
      - "mise.toml"
      - "f3-sidecar/**"
      - "interop-tests/src/tests/**"

jobs:
  # Merge groups don't support path filters, so detect the relevant changes
  # explicitly and skip the lint job when nothing Go-related changed.
  # https://github.com/community/community/discussions/45899
  changes:
    runs-on: ubuntu-slim
    outputs:
      changesFound: ${{ steps.filter.outputs.changesFound }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changesFound:
              - '.github/workflows/go-lint.yml'
              - 'go.work'
              - 'mise.toml'
              - 'f3-sidecar/**'
              - 'interop-tests/src/tests/**'
  lint-go:
    name: Go lint checks
    needs: changes
    if: ${{ needs.changes.outputs.changesFound == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: mise lint:golang

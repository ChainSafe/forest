name: Link Checker
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "**.mdx"
      - "**.html"
      - ".github/workflows/link-check.yml"
  merge_group:
  pull_request:
    branches:
      - main
    paths:
      - "**.md"
      - "**.mdx"
      - "**.html"
      - ".github/workflows/link-check.yml"

jobs:
  # Merge groups don't support path filters, so detect the relevant changes
  # explicitly and skip the job when nothing relevant changed. Scheduled and
  # manual runs always proceed since they have no diff to filter on.
  # https://github.com/community/community/discussions/45899
  changes:
    runs-on: ubuntu-slim
    outputs:
      changesFound: ${{ steps.filter.outputs.changesFound }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changesFound:
              - '**.md'
              - '**.mdx'
              - '**.html'
              - '.github/workflows/link-check.yml'
  link-check:
    needs: changes
    if: ${{ needs.changes.outputs.changesFound == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    name: Link Check
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --user-agent "curl/8.5.0" --no-progress --config ./.config/lychee.toml './*.md' './AGENTS.md'

      - name: Create Issue From File
        if: env.lychee_exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee-report.md

      - name: Fail job on error
        if: env.lychee_exit_code != 0 && github.event_name != 'schedule'
        run: exit 1

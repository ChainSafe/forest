name: Docker lint
permissions:
  contents: read

# Cancel workflow if there is a new change to the branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  merge_group:
  pull_request:
    branches:
      - main
    paths:
      - "**/Dockerfile*"
      - "**/*.dockerfile"
      - "monitored-stack/docker-compose.yml"
      - "monitored-stack/.env.example"
      - ".github/workflows/docker-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/Dockerfile*"
      - "**/*.dockerfile"
      - "monitored-stack/docker-compose.yml"
      - "monitored-stack/.env.example"
      - ".github/workflows/docker-lint.yml"

jobs:
  # Merge groups don't support path filters, so detect the relevant changes
  # explicitly and skip the job when nothing relevant changed.
  # https://github.com/community/community/discussions/45899
  changes:
    runs-on: ubuntu-slim
    outputs:
      changesFound: ${{ steps.filter.outputs.changesFound }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changesFound:
              - '**/Dockerfile*'
              - '**/*.dockerfile'
              - 'monitored-stack/docker-compose.yml'
              - 'monitored-stack/.env.example'
              - '.github/workflows/docker-lint.yml'
  docker-lint:
    needs: changes
    if: ${{ needs.changes.outputs.changesFound == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - name: validate compose file
        run: |
          cp monitored-stack/.env.example monitored-stack/.env
          docker compose -f monitored-stack/docker-compose.yml config
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: "Dockerfile*"
          recursive: true
          # https://github.com/hadolint/hadolint/wiki/DL3008
          # https://github.com/hadolint/hadolint/wiki/DL3018
          ignore: DL3008,DL3018
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: "*.dockerfile"
          recursive: true
          # https://github.com/hadolint/hadolint/wiki/DL3008
          # https://github.com/hadolint/hadolint/wiki/DL3018
          ignore: DL3008,DL3018
